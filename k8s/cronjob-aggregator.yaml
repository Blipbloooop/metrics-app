apiVersion: batch/v1
kind: CronJob
metadata:
  name: metrics-aggregator
  namespace: default
spec:
  schedule: "*/5 * * * *"       # Toutes les 5 minutes
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: aggregator
              image: <TON_REGISTRY>/metrics-aggregator:latest
              env:
                - name: DATABASE_URL
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: DATABASE_URL
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "200m"
                  memory: "128Mi"