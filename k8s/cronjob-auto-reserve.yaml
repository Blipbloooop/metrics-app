apiVersion: batch/v1
kind: CronJob
metadata:
  name: auto-reserve
  namespace: app-production
spec:
  schedule: "*/5 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          containers:
            - name: auto-reserve
              image: curlimages/curl:8.6.0
              command:
                - sh
                - -c
                - |
                  curl -sf -X POST \
                    -H "Authorization: Bearer ${METRICS_INGEST_TOKEN}" \
                    -H "Content-Type: application/json" \
                    http://metrics-app-service.app-production.svc.cluster.local:3000/api/auto-reserve \
                  && echo "[auto-reserve] OK" || echo "[auto-reserve] FAILED"
              env:
                - name: METRICS_INGEST_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: metrics-ingest-token
                      key: token
              resources:
                requests:
                  cpu: "10m"
                  memory: "16Mi"
                limits:
                  cpu: "50m"
                  memory: "32Mi"
