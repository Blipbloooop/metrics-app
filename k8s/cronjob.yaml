apiVersion: batch/v1
kind: CronJob
metadata:
  name: prometheus-metrics-scraper
  namespace: app-production
spec:
  schedule: "* * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 5
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        spec:
          restartPolicy: Never
          nodeSelector:
            kubernetes.io/hostname: k8s-worker-1
          containers:
            - name: scraper
              image: metrics-scraper:latest
              imagePullPolicy: Never
              env:
                - name: PROMETHEUS_URL
                  value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
                - name: INGEST_URL
                  value: "http://metrics-app-service.app-production.svc.cluster.local:3000"
                - name: METRICS_INGEST_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: metrics-ingest-token
                      key: token
              resources:
                requests:
                  cpu: "50m"
                  memory: "64Mi"
                limits:
                  cpu: "100m"
                  memory: "128Mi"
