---
# ServiceAccount pour l'accès à l'API Kubernetes
apiVersion: v1
kind: ServiceAccount
metadata:
  name: metrics-app-sa
  namespace: app-production

---
# ClusterRole avec permissions pour /api/reserve
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: metrics-app-role
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["resourcequotas", "limitranges"]
    verbs: ["get", "list", "create", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "update"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["list"]

---
# ClusterRoleBinding pour lier le ClusterRole au ServiceAccount
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: metrics-app-role-binding
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: metrics-app-role
subjects:
  - kind: ServiceAccount
    name: metrics-app-sa
    namespace: app-production

---
# Secret avec DATABASE_URL construite à partir des credentials postgres
apiVersion: v1
kind: Secret
metadata:
  name: metrics-app-secrets
  namespace: app-production
type: Opaque
stringData:
  DATABASE_URL: "postgresql://metrics_user:metrics_password@postgres.default.svc.cluster.local:5432/k8s_metrics"
  JWT_SECRET: "change-me-in-production-use-a-long-random-secret"
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "admin1234"

---
# Deployment Next.js
apiVersion: apps/v1
kind: Deployment
metadata:
  name: metrics-app
  namespace: app-production
  labels:
    app: metrics-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: metrics-app
  template:
    metadata:
      labels:
        app: metrics-app
    spec:
      serviceAccountName: metrics-app-sa
      containers:
        - name: metrics-app
          image: metrics-app:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: metrics-app-secrets
                  key: DATABASE_URL
            - name: METRICS_INGEST_TOKEN
              valueFrom:
                secretKeyRef:
                  name: metrics-ingest-token
                  key: token
            - name: PREDICTION_SERVICE_URL
              value: "http://prediction-service.ai-module.svc.cluster.local:3001"
            - name: PROMETHEUS_URL
              value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc:9090"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: metrics-app-secrets
                  key: JWT_SECRET
            - name: ADMIN_USERNAME
              valueFrom:
                secretKeyRef:
                  name: metrics-app-secrets
                  key: ADMIN_USERNAME
            - name: ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: metrics-app-secrets
                  key: ADMIN_PASSWORD
            - name: NODE_ENV
              value: "production"
            - name: NEXT_TELEMETRY_DISABLED
              value: "1"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-1

---
# Service ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: metrics-app-service
  namespace: app-production
  labels:
    app: metrics-app
spec:
  type: ClusterIP
  selector:
    app: metrics-app
  ports:
    - port: 3000
      targetPort: 3000
      protocol: TCP

---
# Ingress pour accès externe
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: metrics-app-ingress
  namespace: app-production
spec:
  ingressClassName: nginx
  rules:
    - host: metrics.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: metrics-app-service
                port:
                  number: 3000
