apiVersion: apps/v1
kind: Deployment
metadata:
  name: prediction-service
  namespace: ai-module
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prediction-service
  template:
    metadata:
      labels:
        app: prediction-service
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-worker-1
      containers:
        - name: prediction-service
          image: prediction-service:1.2.0
          imagePullPolicy: Never
          ports:
            - containerPort: 3001
          env:
            - name: OLLAMA_URL
              value: "http://ollama-service:11434"
            - name: OLLAMA_MODEL
              value: "qwen2:0.5b"
            - name: PROMETHEUS_URL
              value: "http://monitoring-kube-prometheus-prometheus.monitoring.svc.cluster.local:9090"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: prediction-service
  namespace: ai-module
spec:
  selector:
    app: prediction-service
  ports:
    - port: 3001
      targetPort: 3001
  type: ClusterIP
